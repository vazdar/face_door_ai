<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Face Door AI</title>
<style>body{font-family:Arial,sans-serif;background:#111827;color:#f9fafb;margin:0;padding:24px}main{max-width:1000px;margin:auto}.card{background:#1f2937;padding:18px;border-radius:14px;margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.metric{background:#111827;padding:12px;border-radius:10px}img{width:100%;border-radius:10px;background:#000}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #374151;text-align:left}button{padding:10px 14px;border:0;border-radius:8px;cursor:pointer}.bad{color:#f87171}.good{color:#4ade80}</style></head>
<body><main><h1>Face Door AI Anti-Spoofing</h1><section class="card"><img src="/video_feed" alt="Live stream"></section>
<section class="card"><div class="grid"><div class="metric">Người: <b id="person">-</b></div><div class="metric">Hiện diện: <b id="presence">-</b></div><div class="metric">AI chống giả: <b id="spoof">-</b></div><div class="metric">Live score: <b id="score">-</b></div><div class="metric">Thử thách: <b id="challenge">-</b></div><div class="metric">Cửa: <b id="door">-</b></div></div><p id="model"></p><button onclick="reloadDataset()">Nạp lại dataset + model</button></section>
<section class="card"><h2>Lịch sử gần đây</h2><table><thead><tr><th>Người</th><th>Thời gian</th><th>Kết quả</th><th>Face distance</th><th>Live score</th></tr></thead><tbody id="logs"></tbody></table></section>
</main><script>
async function refresh(){const s=await fetch('/api/status').then(r=>r.json());for(const [id,v] of Object.entries({person:s.person,presence:s.presence,spoof:s.anti_spoof,score:Number(s.live_score).toFixed(3),challenge:s.challenge,door:s.door}))document.getElementById(id).textContent=v;const m=document.getElementById('model');m.textContent=s.anti_spoof_available?'Model AI: sẵn sàng':`Model AI chưa sẵn sàng: ${s.anti_spoof_error||'unknown'}`;m.className=s.anti_spoof_available?'good':'bad';const logs=await fetch('/api/logs?limit=20').then(r=>r.json());document.getElementById('logs').innerHTML=logs.map(x=>`<tr><td>${x.person_name}</td><td>${x.event_time}</td><td>${x.result}</td><td>${x.distance?.toFixed(3)??'-'}</td><td>${x.live_score?.toFixed(3)??'-'}</td></tr>`).join('')}
async function reloadDataset(){await fetch('/api/reload-dataset',{method:'POST'});refresh()}setInterval(refresh,1500);refresh();
</script></body></html>
